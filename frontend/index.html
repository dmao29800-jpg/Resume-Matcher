<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历 · JD 匹配度分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Hero ─────────────────────────────────────── -->
  <header class="hero">
    <div class="hero__badge">AI 驱动</div>
    <h1 class="hero__title">简历 · JD<br>匹配分析</h1>
    <p class="hero__sub">上传简历，粘贴 JD，秒知匹配度与改进建议</p>
  </header>

  <!-- ─── Main Form ─────────────────────────────────── -->
  <main class="workspace">

    <!-- 简历上传 -->
    <div class="card">
      <div class="card__header">
        <span class="card__icon">📄</span>
        <div>
          <h2 class="card__title">上传简历</h2>
          <p class="card__desc">支持 PDF · DOCX · TXT</p>
        </div>
      </div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone__inner" id="dropInner">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-zone__text">拖拽文件到这里，或<span class="link-btn" id="fakeBrowse">点击选择文件</span></p>
          <p class="drop-zone__hint" id="fileName">尚未选择文件</p>
        </div>
        <input type="file" id="resume" accept=".pdf,.docx,.txt" hidden>
      </div>
    </div>

    <!-- JD 输入 -->
    <div class="card">
      <div class="card__header">
        <span class="card__icon">🔍</span>
        <div>
          <h2 class="card__title">岗位描述（JD）</h2>
          <p class="card__desc">粘贴完整的岗位要求内容</p>
        </div>
      </div>
      <textarea
        id="jd"
        rows="8"
        placeholder="粘贴 JD 内容，例如：&#10;· 3 年以上 Python 后端开发经验&#10;· 熟悉 Django / FastAPI 框架&#10;· 熟练使用 MySQL、Redis&#10;· 本科及以上学历，计算机相关专业"
      ></textarea>
      <div class="textarea__counter"><span id="jdLen">0</span> 字</div>
    </div>

    <!-- 分析按钮 -->
    <button class="btn-primary" id="analyzeBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      开始分析
    </button>

    <!-- Loading -->
    <div class="loading" id="loading" hidden>
      <div class="spinner"></div>
      <p>分析中，请稍候…</p>
    </div>

    <!-- 结果区 -->
    <section class="result-wrap" id="result" hidden>

      <!-- 分数圆环 -->
      <div class="score-ring-wrap">
        <div class="score-ring" id="scoreRing">
          <svg viewBox="0 0 120 120" class="score-ring__svg">
            <circle class="score-ring__bg" cx="60" cy="60" r="50"/>
            <circle class="score-ring__fill" id="scoreFill" cx="60" cy="60" r="50"/>
          </svg>
          <div class="score-ring__text">
            <span class="score-ring__num" id="scoreNum">0</span>
            <span class="score-ring__unit">分</span>
          </div>
        </div>
        <p class="score-label" id="scoreLabel">分析完成</p>
      </div>

      <!-- 匹配度说明 -->
      <div class="score-bar-wrap">
        <div class="score-bar">
          <div class="score-bar__fill" id="scoreBarFill"></div>
        </div>
        <div class="score-bar__labels">
          <span>0</span>
          <span>25</span>
          <span>50</span>
          <span>75</span>
          <span>100</span>
        </div>
      </div>

      <!-- 建议卡片 -->
      <div class="tips-wrap" id="tipsWrap">
        <h3 class="tips-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          改进建议（STAR 法则）
        </h3>
        <ul class="tips-list" id="feedback"></ul>
      </div>

      <!-- 重新分析 -->
      <button class="btn-ghost" id="resetBtn">← 重新分析</button>
    </section>

  </main>

  <footer class="footer">
    Powered by <strong>AI</strong> · Resume Matcher v2
  </footer>

  <script src="main.js"></script>
</body>
</html>
